name: Compilar Kernel Legion 2 Pro
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Descargar Código Base
        uses: actions/checkout@v4
        with:
          # Ponemos esto en 'false' para que no de el error 128
          submodules: false
          fetch-depth: 1

      - name: Instalar Herramientas
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison lld llvm libssl-dev libelf-dev python3 python-is-python3
          echo "/usr/lib/llvm-14/bin" >> $GITHUB_PATH

      - name: Descargar KernelSU-Next Manual (Fix Error 128)
        run: |
          # Si la carpeta KernelSU-Next ya existe pero está vacía, la borramos
          rm -rf KernelSU-Next
          # La descargamos directamente desde su fuente oficial
          git clone https://github.com/rifsxd/KernelSU-Next KernelSU-Next

      - name: Preparar y Compilar
        run: |
          export ARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          
          # Configuración para Snapdragon 888 (Legion 2)
          make vendor/lahaina-gki_defconfig
          
          # Compilar ignorando errores de avisos
          make -j$(nproc) CROSS_COMPILE=aarch64-linux-gnu- KCFLAGS="-Wno-error" || true
          make -j$(nproc) CROSS_COMPILE=aarch64-linux-gnu-

      - name: Subir Archivos
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Legion-2-Pro
          path: arch/arm64/boot/Image.gz

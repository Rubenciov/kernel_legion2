name: Compilar Kernel Legion 2 Pro
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout del Código
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 1

      - name: Configurar Entorno (Fix Error 26)
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison lld llvm libssl-dev libelf-dev python3 python-is-python3 libarchive-tools
          # Esto asegura que las herramientas de compilación estén en el PATH
          echo "/usr/lib/llvm-14/bin" >> $GITHUB_PATH

      - name: Preparar Compilación
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          # Limpiamos posibles residuos
          make clean
          make mrproper
          # Usamos la configuración específica para tu procesador (Snapdragon 888)
          make vendor/lahaina-gki_defconfig

      - name: Compilar Kernel
        run: |
          export ARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          # El comando '|| true' evita que se detenga por avisos menores
          make -j$(nproc) CROSS_COMPILE=aarch64-linux-gnu- KCFLAGS="-Wno-error" || true
          make -j$(nproc) CROSS_COMPILE=aarch64-linux-gnu-

      - name: Subir Resultado
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Legion-2-Pro
          path: |
            arch/arm64/boot/Image
            arch/arm64/boot/Image.gz
            arch/arm64/boot/dtbo.img

name: Compilar Kernel Legion 2 Pro
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar Código Base
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Instalar Dependencias del Sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison lld llvm libssl-dev libelf-dev python3 python-is-python3 git wget

      - name: Descargar Herramientas de Compilacion (Clang)
        run: |
          mkdir toolchain
          cd toolchain
          wget https://github.com/llvm/llvm-project/releases/download/llvmorg-14.0.0/clang+llvm-14.0.0-x86_64-linux-gnu-ubuntu-18.04.tar.xz
          tar -xf clang+llvm-14.0.0-x86_64-linux-gnu-ubuntu-18.04.tar.xz
          echo "$(pwd)/clang+llvm-14.0.0-x86_64-linux-gnu-ubuntu-18.04/bin" >> $GITHUB_PATH

      - name: Descargar KernelSU-Next
        run: |
          rm -rf KernelSU-Next
          git clone https://github.com/rifsxd/KernelSU-Next KernelSU-Next

      - name: Compilar
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export CC=clang
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export LD=ld.lld
          
          # 1. Configurar
          make O=out vendor/lahaina-gki_defconfig
          
          # 2. Compilar (Usamos O=out para que sea mas limpio)
          make -j$(nproc) O=out \
              CC=clang \
              LD=ld.lld \
              AR=llvm-ar \
              NM=llvm-nm \
              OBJCOPY=llvm-objcopy \
              OBJDUMP=llvm-objdump \
              STRIP=llvm-strip \
              CROSS_COMPILE=aarch64-linux-gnu- \
              CROSS_COMPILE_ARM32=arm-linux-gnueabi-

      - name: Subir Kernel
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Legion2-Listo
          path: out/arch/arm64/boot/Image.gz

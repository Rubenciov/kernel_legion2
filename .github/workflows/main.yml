name: Compilar Kernel Legion 2 Pro
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar Código
        uses: actions/checkout@v4
        with:
          submodules: false # Ignoramos los submódulos rotos
          fetch-depth: 1

      - name: Instalar Herramientas Esenciales
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison lld llvm libssl-dev libelf-dev python3 python-is-python3 wget git

      - name: Descargar Toolchain Proton (Clang 13)
        run: |
          git clone --depth=1 https://github.com/kdrag0n/proton-clang clang
          echo "$(pwd)/clang/bin" >> $GITHUB_PATH

      - name: Configurar y Compilar
        run: |
          # Definimos variables de entorno
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export CC=clang
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip

          # 1. Crear configuración base
          make vendor/lahaina-gki_defconfig

          # 2. Compilar (Ignorando errores de código antiguos)
          make -j$(nproc) KCFLAGS="-Wno-error"

      - name: Subir Kernel
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Legion2-Pro
          path: arch/arm64/boot/Image.gz

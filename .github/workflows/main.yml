name: Compilar Kernel Legion 2 Pro
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar Solo Codigo Base
        uses: actions/checkout@v4
        with:
          submodules: false # PROHIBIDO buscar submodulos rotos
          fetch-depth: 1

      - name: Instalar Herramientas
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison lld llvm libssl-dev libelf-dev python3 python-is-python3 wget git
          # Descargamos un compilador que no dependa de Git
          wget https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/master/clang-r416183b1.tar.gz
          mkdir clang && tar -xf clang-r416183b1.tar.gz -C clang
          echo "$(pwd)/clang/bin" >> $GITHUB_PATH

      - name: Limpieza de Git Corrupto
        run: |
          # Borramos rastro de submodulos que causan el Error 128
          rm -rf .gitmodules
          rm -rf KernelSU-Next

      - name: Compilar (Fuerza Bruta)
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang
          
          # Generar config
          make vendor/lahaina-gki_defconfig
          
          # Compilar. Si falla un paso, que intente el siguiente
          make -j$(nproc) LLVM=1 LLVM_IAS=1 KCFLAGS="-Wno-error" || make -j$(nproc) ARCH=arm64

      - name: Subir lo que se haya generado
        uses: actions/upload-artifact@v4
        with:
          name: Resultado-Kernel
          path: |
            arch/arm64/boot/Image.gz
            arch/arm64/boot/Image

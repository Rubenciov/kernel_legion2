name: Compilar Kernel Legion 2 Pro
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Descargar Código
        uses: actions/checkout@v4
        with:
          # ESTO ES LO MÁS IMPORTANTE:
          # Le dice a GitHub que ignore el error del submódulo 128
          submodules: false 
          fetch-depth: 1

      - name: Instalar Herramientas
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison lld llvm libssl-dev libelf-dev python3 python2-minimal
          sudo ln -sf /usr/bin/python3 /usr/bin/python

      - name: Configurar y Compilar
        run: |
          export ARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          
          # Generar configuración base
          make vendor/lahaina-gki_defconfig
          
          # Forzar KernelSU (aunque la carpeta sea un "fantasma")
          echo "CONFIG_KSU=y" >> arch/arm64/configs/vendor/lahaina-gki_defconfig
          
          # Compilar sin miedo al éxito
          make -j$(nproc) KCFLAGS="-Wno-error" || make -j$(nproc)

      - name: Subir Kernel
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Legion2-Compilado
          path: arch/arm64/boot/Image.gz

name: Compilar Kernel Legion 2 Pro
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar Código
        uses: actions/checkout@v4
        with:
          submodules: false # Ignora los submodulos rotos que dan error 128
          fetch-depth: 1

      - name: Instalar Compiladores Oficiales
        run: |
          sudo apt-get update
          # Instalamos GCC para ARM64 y las herramientas de LLVM (Clang) que vienen con Ubuntu
          sudo apt-get install -y bc build-essential flex bison lld llvm libssl-dev libelf-dev python3 python-is-python3 gcc-aarch64-linux-gnu

      - name: Limpiar Basura de Git
        run: |
          # Borramos el archivo que causa el error 128 (el de las capturas)
          rm -f .gitmodules
          rm -rf KernelSU-Next

      - name: Compilar
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          # 1. Intentar usar la config del Legion 2
          make vendor/lahaina-gki_defconfig || make lahaina_defconfig
          
          # 2. Compilar con GCC (mas compatible para errores de codigo antiguo)
          # Usamos '-i' para que ignore errores menores y siga hasta el final
          make -j$(nproc) ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- KCFLAGS="-Wno-error"

      - name: Subir Kernel
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Legion-2
          path: |
            arch/arm64/boot/Image.gz
            arch/arm64/boot/Image
